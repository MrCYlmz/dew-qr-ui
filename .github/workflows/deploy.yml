name: Deploy Frontend and Backend

on:
  push:
    branches:
      - main
    # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Configure npm for GitHub Packages
      run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc

    - name: Install frontend dependencies
      run: npm install

    - name: Build frontend
      env:
        DEW_QR_API_URL: "http://your-production-api-url.com"
      run: npm run build

    - name: Configure Git user
      env:
        GIT_USER: ${{ secrets.GITHUB_ACTOR }}
      run: |
        git config --global user.email "celal63159@gmail.com"
        git config --global user.name "${{ github.actor }}"

    - name: Deploy frontend
      env:
        GIT_USER: ${{ github.actor }}
        GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Example: Deploy to GitHub Pages
        npm install -g gh-pages
        gh-pages -d dist -r "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Build with Jekyll
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./
        destination: ./_site
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4