name: Deploy Frontend and Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Set up Node.js for frontend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # Configure npm to use GitHub token for private packages
    - name: Configure npm for GitHub Packages
      run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc

    # Install the specific version of the API generator package
    - name: Install API generator package
      run: npm install @mrcylmz/dewqr-api-generator@1.0.0-1746991654300

    # Install dependencies for frontend
    - name: Install frontend dependencies
      run: npm install

    # Build the frontend
    - name: Build frontend
      env:
        DEW_QR_API_URL: "https://your-production-api-url.com"
      run: npm run build

    # Deploy the frontend (replace with your hosting platform's deployment method)
    - name: Deploy frontend
      run: |
        # Example: Deploy to GitHub Pages
        npm install -g gh-pages
        gh-pages -d dist